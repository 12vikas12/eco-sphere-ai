<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recycling Centers – EcoSphere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <div class="nav-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
      </div>
      <span>EcoSphere</span>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Detect</a>
      <a href="centers.html" class="nav-link active">Centers</a>
      <a href="stats.html" class="nav-link">Stats</a>
    </div>
  </nav>

  <main class="container">
    <div class="page-header fade-in">
      <h1>
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        Recycling Centers
      </h1>
      <p>Find authorized drop-off locations to recycle your waste properly and earn rewards.</p>
    </div>

    <div class="search-bar fade-in">
      <div class="search-input-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Search by name, city, or address..." oninput="filterCenters()" />
      </div>
      <select id="waste-filter" onchange="filterCenters()">
        <option value="">All Waste Types</option>
        <option>Plastic</option>
        <option>Metal</option>
        <option>Paper</option>
        <option>Glass</option>
        <option>E-Waste</option>
        <option>Organic</option>
        <option>Cardboard</option>
        <option>Textile</option>
        <option>Rubber</option>
        <option>Wood</option>
      </select>
    </div>

    <div id="centers-grid" class="centers-grid fade-in"></div>
  </main>

  <script src="app.js"></script>
  <script>
    loadAllCenters();
  </script>
</body>
</html>
